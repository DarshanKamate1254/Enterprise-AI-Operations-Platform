global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway-api:8000']

  - job_name: 'rag-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rag-service:8000']

  - job_name: 'langgraph'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['langgraph:8000']
