apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: enterprise-ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: darshankamate/enterprise-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: API_PORT
              value: "8001"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "enterprise_ai_ops"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: postgres-password
            - name: QDRANT_HOST
              value: "qdrant"
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: qdrant-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: enterprise-ai-platform
spec:
  ports:
    - port: 8001
  selector:
    app: rag-service
