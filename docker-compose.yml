version: '3.8'

services:
  # --- Relational Database (PostgreSQL) ---
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: enterprise_ai_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_ai_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Caching Layer (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Vector Database (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: enterprise-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: qdrant_secure_api_key_here
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Metrics Aggregation (Prometheus) ---
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: enterprise-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - platform-network
    depends_on:
      - postgres
      - redis
      - qdrant

  # --- Observability Dashboards (Grafana) ---
  grafana:
    image: grafana/grafana:10.4.1
    container_name: enterprise-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_secure_pass
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - platform-network
    depends_on:
      - prometheus

networks:
  platform-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
