name: Platform Integration & Delivery Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # --- 1. Python Backends Test Suite ---
  python-test-suite:
    name: Python Linting & Pytest Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure Python Env (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Tests (Pytest)
        run: |
          pytest --maxfail=2 -v

  # --- 2. Frontend React Dashboard Compile ---
  node-frontend-build:
    name: React TS Client Compilation Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure Node.js Env (20.x)
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Client Packages
        working-directory: ./frontend
        run: npm ci

      - name: Compile Distribution Assets
        working-directory: ./frontend
        run: npm run build

  # --- 3. Docker Compose Orchestration Check ---
  docker-compose-validation:
    name: Docker Compose Syntax Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Verify Compose Architecture Configurations
        run: docker compose config
